const SNAKE_HTML = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake</title>
<script src="https://telegram.org/js/telegram-web-app.js"><\/script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e; --accent: #00ff88; --danger: #ff4466; --text: #e0e0f0; --muted: #555570; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; touch-action: none; }
  #game-wrapper { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; max-width: 420px; padding: 12px; }
  #hud { display: flex; justify-content: space-between; width: 100%; padding: 0 4px; }
  .hud-block { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .hud-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  .hud-value { font-size: 22px; font-weight: bold; color: var(--accent); text-shadow: 0 0 12px var(--accent); letter-spacing: 1px; }
  #canvas-container { position: relative; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; box-shadow: 0 0 30px rgba(0,255,136,0.08); }
  canvas { display: block; image-rendering: pixelated; }
  #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10,10,15,0.92); gap: 16px; backdrop-filter: blur(2px); }
  #overlay.hidden { display: none; }
  .overlay-title { font-size: 28px; font-weight: bold; letter-spacing: 4px; color: var(--accent); text-shadow: 0 0 20px var(--accent); text-transform: uppercase; }
  .overlay-title.dead { color: var(--danger); text-shadow: 0 0 20px var(--danger); }
  .overlay-score { font-size: 13px; color: var(--muted); letter-spacing: 2px; }
  .overlay-score span { color: var(--text); }
  #btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: 'Courier New', monospace; font-size: 13px; letter-spacing: 3px; padding: 10px 28px; cursor: pointer; text-transform: uppercase; transition: all 0.15s; border-radius: 2px; }
  #btn:hover, #btn:active { background: var(--accent); color: var(--bg); box-shadow: 0 0 20px var(--accent); }
  #dpad { display: grid; grid-template-areas: '. up .' 'left . right' '. down .'; grid-template-columns: 52px 52px 52px; grid-template-rows: 52px 52px 52px; gap: 4px; }
  .dpad-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s; user-select: none; }
  .dpad-btn:active { background: var(--border); color: var(--accent); border-color: var(--accent); }
  #dpad-up { grid-area: up; } #dpad-left { grid-area: left; } #dpad-right { grid-area: right; } #dpad-down { grid-area: down; }
  #speed-row { display: flex; gap: 8px; align-items: center; }
  .speed-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 1px; padding: 4px 10px; cursor: pointer; border-radius: 2px; transition: all 0.1s; }
  .speed-btn.active { border-color: var(--accent); color: var(--accent); }
<\/style>
<\/head>
<body>
<div id="game-wrapper">
  <div id="hud">
    <div class="hud-block"><div class="hud-label">Score<\/div><div class="hud-value" id="score-display">0<\/div><\/div>
    <div class="hud-block"><div class="hud-label">Best<\/div><div class="hud-value" id="best-display">0<\/div><\/div>
    <div class="hud-block"><div class="hud-label">Level<\/div><div class="hud-value" id="level-display">1<\/div><\/div>
  <\/div>
  <div id="canvas-container">
    <canvas id="canvas"><\/canvas>
    <div id="overlay">
      <div class="overlay-title" id="overlay-title">SNAKE<\/div>
      <div class="overlay-score" id="overlay-sub">arrows or d-pad to move<\/div>
      <button id="btn">START<\/button>
    <\/div>
  <\/div>
  <div id="speed-row">
    <span style="font-size:9px;letter-spacing:2px;color:var(--muted)">SPEED<\/span>
    <button class="speed-btn active" data-speed="1">SLOW<\/button>
    <button class="speed-btn" data-speed="2">NORMAL<\/button>
    <button class="speed-btn" data-speed="3">FAST<\/button>
  <\/div>
  <div id="dpad">
    <button class="dpad-btn" id="dpad-up">▲<\/button>
    <button class="dpad-btn" id="dpad-left">◀<\/button>
    <button class="dpad-btn" id="dpad-right">▶<\/button>
    <button class="dpad-btn" id="dpad-down">▼<\/button>
  <\/div>
<\/div>
<script>
  if(window.Telegram?.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();}
  const CELL=18,COLS=20,ROWS=20,canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
  canvas.width=COLS*CELL;canvas.height=ROWS*CELL;
  const SPEEDS={1:180,2:110,3:65};
  let speed=1,gameLoop=null,snake,dir,nextDir,food,score,best,running,level;
  best=parseInt(localStorage.getItem('snake_best')||'0');
  document.getElementById('best-display').textContent=best;
  function init(){snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];dir={x:1,y:0};nextDir={x:1,y:0};score=0;level=1;running=true;placeFood();updateHUD();}
  function placeFood(){let p;do{p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}}while(snake.some(s=>s.x===p.x&&s.y===p.y));food=p;}
  function step(){if(!running)return;dir=nextDir;const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS){die();return;}if(snake.some(s=>s.x===h.x&&s.y===h.y)){die();return;}snake.unshift(h);if(h.x===food.x&&h.y===food.y){score+=level*10;level=Math.floor(score/100)+1;placeFood();updateHUD();}else{snake.pop();}draw();}
  function die(){running=false;if(score>best){best=score;localStorage.setItem('snake_best',best);document.getElementById('best-display').textContent=best;}clearInterval(gameLoop);const t=document.getElementById('overlay-title');t.textContent='GAME OVER';t.className='overlay-title dead';document.getElementById('overlay-sub').innerHTML='score <span>'+score+'<\/span> &nbsp;·&nbsp; best <span>'+best+'<\/span>';document.getElementById('btn').textContent='RETRY';document.getElementById('overlay').classList.remove('hidden');}
  function updateHUD(){document.getElementById('score-display').textContent=score;document.getElementById('best-display').textContent=best;document.getElementById('level-display').textContent=level;}
  function draw(){ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='#0f0f18';ctx.lineWidth=0.5;for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,canvas.height);ctx.stroke();}for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(canvas.width,y*CELL);ctx.stroke();}const pulse=0.7+0.3*Math.sin(Date.now()/200);ctx.shadowColor='#ff4466';ctx.shadowBlur=12*pulse;ctx.fillStyle='#ff4466';ctx.beginPath();ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,(CELL/2-3)*pulse,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;snake.forEach((seg,i)=>{const t=i/snake.length,a=1-t*0.5,isHead=i===0;ctx.shadowColor='#00ff88';ctx.shadowBlur=isHead?10:4;ctx.fillStyle=isHead?'rgba(0,255,136,'+a+')':'rgba(0,'+Math.floor(180+75*(1-t))+','+Math.floor(100*(1-t))+','+a+')';const p=isHead?1:2;ctx.beginPath();ctx.roundRect(seg.x*CELL+p,seg.y*CELL+p,CELL-p*2,CELL-p*2,isHead?3:2);ctx.fill();});ctx.shadowBlur=0;}
  function startGame(){clearInterval(gameLoop);init();document.getElementById('overlay').classList.add('hidden');draw();gameLoop=setInterval(step,SPEEDS[speed]);}
  document.getElementById('btn').addEventListener('click',startGame);
  const KEYS={ArrowUp:{x:0,y:-1},w:{x:0,y:-1},ArrowDown:{x:0,y:1},s:{x:0,y:1},ArrowLeft:{x:-1,y:0},a:{x:-1,y:0},ArrowRight:{x:1,y:0},d:{x:1,y:0}};
  document.addEventListener('keydown',e=>{const d=KEYS[e.key];if(d&&!(d.x===-dir.x&&d.y===-dir.y)){nextDir=d;e.preventDefault();}});
  function setDir(dx,dy){if(!(dx===-dir.x&&dy===-dir.y))nextDir={x:dx,y:dy};}
  document.getElementById('dpad-up').addEventListener('click',()=>setDir(0,-1));
  document.getElementById('dpad-down').addEventListener('click',()=>setDir(0,1));
  document.getElementById('dpad-left').addEventListener('click',()=>setDir(-1,0));
  document.getElementById('dpad-right').addEventListener('click',()=>setDir(1,0));
  let tx=0,ty=0;
  canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
  canvas.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>Math.abs(dy))setDir(dx>0?1:-1,0);else setDir(0,dy>0?1:-1);},{passive:true});
  document.querySelectorAll('.speed-btn').forEach(btn=>{btn.addEventListener('click',()=>{speed=parseInt(btn.dataset.speed);document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(running){clearInterval(gameLoop);gameLoop=setInterval(step,SPEEDS[speed]);}});});
  draw();
<\/script>
<\/body>
<\/html>`;

export default {
  async fetch(request) {
    return new Response(SNAKE_HTML, {
      headers: { 'Content-Type': 'text/html;charset=UTF-8' }
    });
  }
};
